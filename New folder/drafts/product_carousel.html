<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Carousel</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    #root {
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function ProductCarousel() {
      const [currentIndex, setCurrentIndex] = useState(0);

      const products = [
        {
          name: 'ELECTRIC',
          center: 'https://via.placeholder.com/400x320?text=ELECTRIC+Front',
          left: 'https://via.placeholder.com/220x280?text=Hand+Cutter+Back',
          right: 'https://via.placeholder.com/220x280?text=Corner+Closed'
        },
        {
          name: 'HAND CUTTER',
          center: 'https://via.placeholder.com/400x320?text=Hand+Cutter+Open',
          left: 'https://via.placeholder.com/220x280?text=Corner+45',
          right: 'https://via.placeholder.com/220x280?text=Electric+45'
        },
        {
          name: 'CORNER',
          center: 'https://via.placeholder.com/400x320?text=Corner+Open',
          left: 'https://via.placeholder.com/220x280?text=Electric+Back',
          right: 'https://via.placeholder.com/220x280?text=Hand+Cutter+Back'
        }
      ];

      const handleNext = () => {
        setCurrentIndex((prev) => (prev + 1) % products.length);
      };

      const handlePrev = () => {
        setCurrentIndex((prev) => (prev - 1 + products.length) % products.length);
      };

      const current = products[currentIndex];

      return (
        <div style={{
          width: '100%',
          background: 'linear-gradient(135deg, #e8eaed 0%, #f3f4f6 100%)',
          minHeight: '600px',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          padding: '2rem',
          borderRadius: '12px',
          position: 'relative',
          overflow: 'hidden'
        }}>
          {/* Subtle background pattern */}
          <div style={{
            position: 'absolute',
            top: 0,
            left: 0,
            right: 0,
            bottom: 0,
            backgroundImage: 'radial-gradient(circle at 20% 50%, rgba(255,255,255,0.5) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(0,0,0,0.02) 0%, transparent 50%)',
            pointerEvents: 'none'
          }} />

          {/* Carousel Container */}
          <div style={{
            position: 'relative',
            width: '100%',
            maxWidth: '1000px',
            height: '400px',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            perspective: '1200px',
            zIndex: 10
          }}>
            {/* Left Product */}
            <div style={{
              position: 'absolute',
              left: '5%',
              opacity: 0.7,
              transform: 'scale(0.65) translateY(20px)',
              transition: 'all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)',
              filter: 'blur(2px)',
              zIndex: 1
            }}>
              <img
                src={current.left}
                alt="side-product"
                style={{
                  maxHeight: '280px',
                  maxWidth: '220px',
                  objectFit: 'contain',
                  display: 'block'
                }}
              />
            </div>

            {/* Center Product */}
            <div style={{
              position: 'absolute',
              opacity: 1,
              transform: 'scale(1) translateY(0)',
              transition: 'all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)',
              zIndex: 20,
              textAlign: 'center'
            }}>
              <img
                src={current.center}
                alt={current.name}
                style={{
                  maxHeight: '320px',
                  maxWidth: '400px',
                  objectFit: 'contain',
                  display: 'block',
                  marginBottom: '12px'
                }}
              />
              <p style={{
                margin: 0,
                fontSize: '16px',
                fontWeight: 500,
                color: '#333',
                textTransform: 'uppercase',
                letterSpacing: '0.5px'
              }}>
                {current.name}
              </p>
            </div>

            {/* Right Product */}
            <div style={{
              position: 'absolute',
              right: '5%',
              opacity: 0.7,
              transform: 'scale(0.65) translateY(20px)',
              transition: 'all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)',
              filter: 'blur(2px)',
              zIndex: 1
            }}>
              <img
                src={current.right}
                alt="side-product"
                style={{
                  maxHeight: '280px',
                  maxWidth: '220px',
                  objectFit: 'contain',
                  display: 'block'
                }}
              />
            </div>
          </div>

          {/* Ground Reflection Line */}
          <div style={{
            width: '80%',
            maxWidth: '900px',
            height: '1px',
            background: 'linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.1) 50%, transparent 100%)',
            margin: '20px 0',
            zIndex: 5
          }} />

          {/* Navigation Controls */}
          <div style={{
            display: 'flex',
            gap: '16px',
            alignItems: 'center',
            justifyContent: 'center',
            marginTop: '20px',
            zIndex: 10
          }}>
            <button
              onClick={handlePrev}
              style={{
                width: '44px',
                height: '44px',
                borderRadius: '50%',
                border: '0.5px solid #ccc',
                background: '#fff',
                cursor: 'pointer',
                fontSize: '18px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                transition: 'all 0.2s ease',
                color: '#333'
              }}
              onMouseEnter={(e) => {
                e.target.style.background = '#f0f0f0';
              }}
              onMouseLeave={(e) => {
                e.target.style.background = '#fff';
              }}
            >
              ←
            </button>

            <div style={{
              display: 'flex',
              gap: '8px',
              alignItems: 'center'
            }}>
              {products.map((_, idx) => (
                <div
                  key={idx}
                  onClick={() => setCurrentIndex(idx)}
                  style={{
                    width: '8px',
                    height: '8px',
                    borderRadius: '50%',
                    background: idx === currentIndex ? '#333' : '#ccc',
                    transition: 'all 0.3s ease',
                    cursor: 'pointer'
                  }}
                />
              ))}
            </div>

            <button
              onClick={handleNext}
              style={{
                width: '44px',
                height: '44px',
                borderRadius: '50%',
                border: '0.5px solid #ccc',
                background: '#fff',
                cursor: 'pointer',
                fontSize: '18px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                transition: 'all 0.2s ease',
                color: '#333'
              }}
              onMouseEnter={(e) => {
                e.target.style.background = '#f0f0f0';
              }}
              onMouseLeave={(e) => {
                e.target.style.background = '#fff';
              }}
            >
              →
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.render(<ProductCarousel />, document.getElementById('root'));
  </script>
</body>
</html>
